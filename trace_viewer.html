function summarize(key,value){

      return `消息(${value.role}):${rd[value.role]||''}`;}
    if(TYPE_DICT[value.type]) return TYPE_DICT[value.type];
  }
  const s=(typeof value==='string')?value:'';
  for(const [m,d] of PAT_DICT){ if(s.includes(m)) return d; }
  if(KEY_DICT[key]) return KEY_DICT[key];
  if(Array.isArray(value)) return `一个数组,共 ${value.length} 项`;
  if(value&&typeof value==='object') return `一个对象,共 ${Object.keys(value).length} 个字段`;

function extractFinalText(rb){

  let t=''; for(const c of (rb.content||[])){ if(c.type==='text') t+=c.text||''; } return t;
}
function packetOverview(p){
  const b=p.request.body||{}, rb=p.response.body||{}, s=p.summary||{};
  const acts=s.actions||[]; const inN=(b.input||b.messages||[]).length;
  const inTok=s.input_tokens, outTok=s.output_tokens;
  if((p.path||'').includes('/v1/models')){
    const n=(rb.models||[]).length;
    return `拉取账号可用的【模型目录】,共 ${n} 个模型(每个 ~40 个能力字段)。Codex 用它决定:用哪个模型、是否走 WebSocket、verbosity / 推理档位等默认值 —— 是整场对话的"配置说明书",握手前先读它。`;
  }
  if(inN===0 && !acts.length && b.type==='response.create'){
    return `【启动预热】:发一个空 input 的 response.create,目的不是提问,而是暖好 WebSocket 连接、并把"系统提示+工具"这段固定前缀的 KV 在服务端缓存住(in ${inTok??'?'} tokens)。因为没带问题,所以本包无输出(out 0);下一包真正提问时就能命中这份缓存。`;
  }
  const sysTxt=Array.isArray(b.system)?b.system.map(x=>x.text||'').join(' '):(typeof b.system==='string'?b.system:'');
  if(sysTxt.includes('Generate a concise')) return `【会话标题生成】辅助调用:把任务内容当数据,让模型起一个 3–7 词的简短标题(返回 {"title":…})。无工具,与主 agent 循环无关。`;
  if(sysTxt.includes('decide which of four states')) return `【通知判断】辅助调用:读 agent 最近的输出,判断它处于哪种状态(done / blocked …),决定要不要提醒用户。`;
  const hasType=(arr,t)=>Array.isArray(arr)&&arr.some(x=>x&&x.type===t);
  const inpStr=JSON.stringify(b.input||[]), msgStr=JSON.stringify(b.messages||[]);
  if((p.path||'').includes('count_tokens'))
    return `【上下文测量 · Claude 专用】调 count_tokens 端点量一下当前上下文有多大(这次 = ${rb.input_tokens??'?'} tokens),据此判断要不要触发压缩。Codex 没有这一步——它直接看响应里的 usage。`;
  if(hasType(rb.output,'compaction'))
    return `【压缩 · 服务端(Codex)】上下文顶到阈值,触发 remote_compaction:请求末尾只带一个裸信号 compaction_trigger,服务端把历史蒸馏成一个加密胶囊 encrypted_content(gAAAA…),客户端读不到内文,下一轮拿它顶替臃肿历史。(in ${inTok} tokens)`;
  if(hasType(b.input,'compaction')&&!hasType(b.input,'compaction_trigger'))
    return `【压缩后(Codex)】历史里那一大坨工具输出已被换成加密 compaction 胶囊,所以 input 从峰值骤降到 ${inTok} tokens。模型基于"摘要胶囊 + 新消息"继续往下跑。`;
  if(msgStr.includes('Respond with TEXT ONLY'))
    return `【压缩 · 客户端(Claude)】注入一段明文指令:"把对话总结成 <analysis>/<summary>,期间禁止调用工具"。模型据此产出一段人类可读的摘要——和 Codex 的加密胶囊正相反。`;
  if((b.messages&&b.messages[0]&&JSON.stringify(b.messages[0]).includes('ran out of context')))
    return `【压缩后(Claude)】臃肿的读文件历史已被顶替成开头那段明文摘要(messages[0]:"…continued…ran out of context…")。之后就是"摘要 + 新消息"继续。`;
  if(inpStr.includes('subagent_notification'))
    return `【父代理 · 收结果】子代理干完了,父代理收到 subagent_notification——里面只有子代理的最终输出(HELLO_FROM_SUBAGENT),中间过程不回传。这就是上下文隔离。`;
  if(inpStr.includes('Run exactly this shell command')&&inpStr.includes('HELLO_FROM_SUBAGENT'))
    return `【子代理 · 自己的请求】instructions(系统提示)和父代理字节一致(21335 字),但上下文是全新的——只装分给它的子任务(echo …),看不到父代理历史。同一个大脑,隔离的工作台。`;
  const final=extractFinalText(rb).replace(/\s+/g,' ').trim();
  const eff=(b.reasoning||{}).effort;
  const rtok=((rb.usage||{}).output_tokens_details||{}).reasoning_tokens;
  const head=inN?`带着 ${inN} 条历史发起请求`:`发起请求`;
  let think='';
  if(eff!=null) think=rtok?`(思考档=${eff}:答案前先做了 ${rtok} 个 reasoning token 的推理——内容加密)`:`(思考档=${eff}:reasoning=0,直接作答)`;
  let mid;
  if(acts.length){ const c={}; acts.forEach(a=>c[a]=(c[a]||0)+1);
    mid=`模型用了:${Object.entries(c).map(([k,v])=>v>1?`${k}×${v}`:k).join('、')}`; }
  else mid=`未调用工具`;
  const tail=final?`,最终回答:"${final.slice(0,70)}${final.length>70?'…':''}"`:'';
  const tok=(inTok!=null||outTok!=null)?`(in ${inTok??'–'} / out ${outTok??'–'} tokens)`:'';
  return `${head}${think};${mid}${tail}。${tok}`;
}

function codexInputSketch(input,prompt){

    lines.push('    1. developer · 权限 / skills / memory 等注入上下文');

function packetLines(packets,limit=8){
  const list=(packets||[]).slice(0,limit).map(packetLine);

function outputText(p){
  const rb=((p||{}).response||{}).body||{};
  const pieces=[];
  for(const item of (rb.output||rb.content||[])){
    if(item&&typeof item==='object'&&item.text) pieces.push(item.text);
    for(const c of (item.content||[])) if(c&&c.text) pieces.push(c.text);
  }
  return pieces.join(' ').replace(/\s+/g,' ').trim();
}

      '  #3 spawn_agent · 派生子代理',
      '  #5 子代理 exec_command · 独立上下文执行 echo',
      '  #6 wait_agent · 父代理等待结果',
      '  #7 message · HELLO_FROM_SUBAGENT',

      '  #9 message · DONE',
      '',

}
function fmt(n){return n==null?'–':Number(n).toLocaleString();}
function usageOf(p){return ((p||{}).response||{}).body?.usage||{};}
function summaryOf(p){return (p||{}).summary||{};}

function overviewSpec(data){
  const packets=data.packets||[], agent=data.agent;
  const prompt=promptForLab(data);
  const promptLit=JSON.stringify(String(prompt));
  const titlePrompt=shortText(prompt,32);
  if(lab!=='hi') return nonHiOverviewSpec(data,prompt,titlePrompt);
  const names=(tools)=>Array.isArray(tools)?tools.map(t=>t.name).filter(Boolean).slice(0,8):[];
  const textOf=(content)=>Array.isArray(content)?content.map(x=>x.text||'').filter(Boolean).join(' '):'';
  if(agent==='claude'){
    const p=packets[0]||{}, body=bodyOf(p), usage=usageOf(p), s=summaryOf(p);
    const userMsg=(body.messages||[]).find(m=>m.role==='user')||{};
    const contentBlocks=Array.isArray(userMsg.content)?userMsg.content.length:0;
    const injected=Math.max(0,contentBlocks-1);
    const toolNames=names(body.tools);
    const answer=textOf((((p.response||{}).body||{}).content||[]));
    const actualContext=(Number(usage.input_tokens)||0)+(Number(usage.cache_creation_input_tokens)||0)+(Number(usage.cache_read_input_tokens)||0);
    return {
      title:`「${titlePrompt}」的 Claude API 结构`,
      meta:`POST https://api.anthropic.com${(p.path||'/v1/messages').replace('?beta=true','')}  ·  Claude Code / claude-tap 抓取`,
      requestTitle:'→ Request Body',
      request:[
        '{',
        `  "model": "${body.model||s.model||'claude-*'}",`,
        '',
        '  "messages": [{',
        '    "role": "user",',
        `    "content": [${contentBlocks} 个 block，${injected} 个是注入的上下文`,
        '      { "text": "<system-reminder> memory / 项目上下文 ..." },',
        `      { "text": ${promptLit}, "cache_control": {"ttl": "1h"} }`,
        '    ]',
        '  }],',
        '',
        '  * * *',
        '',
        `  "system": [${Array.isArray(body.system)?body.system.length:'?'} 块系统提示词`,
        '    { "text": "x-anthropic-billing-header: cc_version=..." },',
        '    { "text": "You are a Claude agent ..." },',
        '    { "text": "# Harness ... # Environment ..." }',
        '  ],',
        '',
        '  * * *',
        '',
        `  "tools": [${Array.isArray(body.tools)?body.tools.length:(s.tools_count||0)} 个工具定义`,
        ...toolNames.map(n=>`    { "name": "${n}", "description": "..." },`),
        '    ...',
        '  ],',
        '',
        `  "max_tokens": ${body.max_tokens||64000},`,
        `  "stream": ${body.stream===false?'false':'true'},`,
        `  "thinking": { "type": "${body.thinking?.type||'adaptive'}" },`,
        `  "output_config": { "effort": "${body.output_config?.effort||'default'}" }`,
        '}'
      ],
      responseTitle:'← Response  SSE text/event-stream',
      response:[
        'event: message_start',
        'data:',
        '{',
        '  "type": "message_start",',
        '  "message": {',
        `    "model": "${(((p.response||{}).body||{}).model)||body.model||s.model}",`,
        '    "usage": {',
        `      "input_tokens": ${fmt(usage.input_tokens)},`,
        `      "cache_creation_input_tokens": ${fmt(usage.cache_creation_input_tokens)},`,
        `      "cache_read_input_tokens": ${fmt(usage.cache_read_input_tokens)},`,
        `      "output_tokens": ${fmt(usage.output_tokens)}`,
        '    }',
        '  }',
        '}',
        '',
        '  * * *',
        '',
        'event: content_block_delta',
        `{ "delta": { "type": "text_delta", "text": "${answer.slice(0,42)||'Hi! How can I help you today?'}" } }`,
        '',
        '  * * *',
        '',
        'event: message_delta',
        `{ "delta": { "stop_reason": "${(((p.response||{}).body||{}).stop_reason)||'end_turn'}" }, "usage": { "output_tokens": ${fmt(usage.output_tokens)} } }`,
        '',
        'event: message_stop',
        '{ "type": "message_stop" }'
      ],
      formula:`实际上下文 = ${fmt(usage.input_tokens)} + ${fmt(usage.cache_creation_input_tokens)} + ${fmt(usage.cache_read_input_tokens)} = ${fmt(actualContext)} tokens`,
      focusText:prompt,
      foot:'对照参考页：请求按 body 拆；响应按 SSE 事件拆；最后单独算缓存账单。'
    };
  }
  const modelPacket=packets.find(p=>(p.path||'').includes('/v1/models'))||{};
  const prewarm=packets.find(p=>p.method==='WEBSOCKET' && (summaryOf(p).output_tokens||0)===0)||packets[1]||{};
  const real=packets[packets.length-1]||{};
  const preBody=bodyOf(prewarm), realBody=bodyOf(real), realUsage=usageOf(real), preUsage=usageOf(prewarm), preSummary=summaryOf(prewarm), realSummary=summaryOf(real);
  const modelCount=(((modelPacket.response||{}).body||{}).models||[]).length||'若干';
  const preTools=names(preBody.tools), realTools=names(realBody.tools);
  const visibleInput=(Number(preSummary.input_tokens)||0)+(Number(realSummary.input_tokens)||0);
  const outText=((((real.response||{}).body||{}).output||[]).flatMap(o=>o.content||[]).map(c=>c.text||'').filter(Boolean).join(' ')||'Hi! How can I help?');
  return {
    title:`「${titlePrompt}」的 Codex API 结构`,
    meta:`GET ${modelPacket.path||'/v1/models'}  +  WEBSOCKET /v1/responses  ·  Codex / claude-tap 抓取`,
    requestTitle:'→ Request / Handshake',
    request:[
      `GET ${modelPacket.path||'/v1/models'}`,
      '',
      '← Response',
      `{ "models": [${modelCount} 个模型条目] }`,
      '',
      '  * * *',
      '',
      '→ Request Body  WEBSOCKET /v1/responses  (prewarm)',
      '{',
      '  "type": "response.create",',
      `  "model": "${preBody.model||preSummary.model}",`,
      '  "instructions": "You are Codex ...",',
      `  "input": [${Array.isArray(preBody.input)?preBody.input.length:'?'} 条，空 input],`,
      `  "tools": [${Array.isArray(preBody.tools)?preBody.tools.length:(preSummary.tools_count||0)} 个工具定义`,
      ...preTools.map(n=>`    { "name": "${n}", "description": "..." },`),
      '    ...',
      '  ],',
      `  "store": ${preBody.store===false?'false':'true'},`,
      `  "stream": ${preBody.stream===false?'false':'true'},`,
      `  "prompt_cache_key": "${preBody.prompt_cache_key?'...':'–'}"`,
      '}',
      '',
      '  * * *',
      '',
      '→ Request Body  WEBSOCKET /v1/responses  (real turn)',
      '{',
      '  "type": "response.create",',
      `  "previous_response_id": "${realBody.previous_response_id?'resp_...':'–'}",`,
      ...codexInputSketch(realBody.input,prompt),
      `  "tools": [${Array.isArray(realBody.tools)?realBody.tools.length:(realSummary.tools_count||0)} 个工具定义`,
      ...realTools.map(n=>`    { "name": "${n}", "description": "..." },`),
      '    ...',
      '  ],',
      `  "reasoning": { "effort": "${realBody.reasoning?.effort||'default'}" },`,
      `  "store": ${realBody.store===false?'false':'true'}`,
      '}'
    ],
    responseTitle:'← Response  WebSocket frames',
    response:[
      'prewarm response:',
      '{',
      `  "status": "${((prewarm.response||{}).body||{}).status||'completed'}",`,
      '  "output": [],',
      '  "usage": {',
      `    "input_tokens": ${fmt(preSummary.input_tokens)},`,
      `    "cached_tokens": ${fmt(preUsage.input_tokens_details?.cached_tokens)},`,
      `    "output_tokens": ${fmt(preSummary.output_tokens)}`,
      '  }',
      '}',
      '',
      '  * * *',
      '',
      'real turn response:',
      '{',
      `  "status": "${((real.response||{}).body||{}).status||'completed'}",`,
      '  "output": [{ "type": "message", "role": "assistant",',
      `    "content": [{ "type": "output_text", "text": "${outText.slice(0,42)}" }]`,
      '  }],',
      '  "usage": {',
      `    "input_tokens": ${fmt(realSummary.input_tokens)},`,
      `    "cached_tokens": ${fmt(realUsage.input_tokens_details?.cached_tokens)},`,
      `    "output_tokens": ${fmt(realSummary.output_tokens)}`,
      '  }',
      '}'
    ],
    formula:`可见输入开销 = ${fmt(preSummary.input_tokens)} + ${fmt(realSummary.input_tokens)} = ${fmt(visibleInput)} input tokens；real turn cached_tokens = ${fmt(realUsage.input_tokens_details?.cached_tokens)}`,
    focusText:prompt,
    foot:'同一个版式：先拆请求体，再拆响应体，最后把缓存与 token 账算清楚。'
  };
}
async function renderExperimentOverview(){
  mode='overview';
  document.body.classList.add('guide');
  const h=$('#hub');h.classList.add('expview');h.innerHTML='<div class="loading">载入结构概览 …</div>';
  $('#agentName').textContent=curLab().label;
  try{DATA=await getTrace(lab,variant);}catch(e){h.innerHTML='<div class="err">加载概览失败 — 请确认 trace JSON 已在同目录。</div>';return;}
  const spec=overviewSpec(DATA);
  h.innerHTML='';
  const page=el('div','structure-page');
  const head=el('div','structure-head');
  const left=el('div');
  left.append(el('h2','structure-title',spec.title));
  left.append(el('div','structure-meta',spec.meta));
  const actionsBox=el('div','structure-actions');
  curLab().variants.forEach(v=>{const b=el('button',v.k===variant?'active':'',v.label);b.onclick=()=>selectVariant(v.k);actionsBox.append(b);});
  const raw=el('button','rawbtn','真实抓包 JSON →');raw.onclick=()=>setMode('packets',true);actionsBox.append(raw);
  head.append(left,actionsBox);page.append(head);
  const compare=el('div','structure-compare');
  [[spec.requestTitle,spec.request,'req'],[spec.responseTitle,spec.response,'res']].forEach(([title,lines,kind])=>{
    const block=el('div',`structure-block ${kind}`);
    block.dataset.side=kind;
    block.tabIndex=0;
    block.setAttribute('role','button');
    block.setAttribute('aria-pressed','false');
    block.setAttribute('aria-label',kind==='req'?'高亮 Request':'高亮 Response');
    block.onclick=()=>setStructureActive(compare,kind);
    block.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();setStructureActive(compare,kind);}};
    block.append(el('h3','structure-label',title));
    block.append(renderStructureLines(lines,spec.focusText));
    compare.append(block);
  });
  setStructureActive(compare,activeStructureSide);
  page.append(compare);
  const formula=el('div','structure-formula');formula.innerHTML=`<b>${spec.formula}</b>`;
  page.append(formula);
  const foot=el('div','structure-foot');foot.innerHTML=`${spec.foot} · 参考: <a class="structure-link" href="https://zhangchitc.github.io/claude_code/051_claude_trace/structure_diagram.html" target="_blank" rel="noopener">structure_diagram.html</a>`;
  page.append(foot);
  h.append(page);
}

(function(){
  const rz=document.getElementById('resizer'),listEl=document.getElementById('list'),mainEl=document.querySelector('.main');
  const K='tracelab.listw',KO='tracelab.listw.open';
  const getLS=k=>{try{return localStorage.getItem(k);}catch(e){return null;}};
  const setLS=(k,v)=>{try{localStorage.setItem(k,String(v));}catch(e){}};
  const btn=document.createElement('button');btn.id='expandSidebar';btn.textContent='▸ 侧栏';btn.title='展开侧栏';document.body.appendChild(btn);
  const W=()=>listEl.offsetWidth;

    mainEl.classList.toggle('sidebar-hidden',hide);
    btn.style.display=hide?'block':'none';};
  window.__updSidebar=upd;
  const setW=w=>{const hide=w<10;mainEl.classList.toggle('sidebar-hidden',hide);listEl.style.width=(hide?0:w)+'px';upd();};
  const openW=()=>{const v=parseInt(getLS(KO)||'');return (v>=120)?v:316;};
  let drag=false;

  window.addEventListener('mousemove',e=>{if(!drag)return;const left=mainEl.getBoundingClientRect().left;let w=e.clientX-left;if(w<120)w=0;else if(w>680)w=680;setW(w);});
  window.addEventListener('mouseup',()=>{if(!drag)return;drag=false;rz.classList.remove('dragging');document.body.style.userSelect='';const w=W();setLS(K,w);if(w>=120)setLS(KO,w);});

  upd();
})();
